<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>未経験からIT営業エンジニアへ成長するためのロードマップ</title>
  <style>
    :root {
      --navy: #0f2341;
      --navy-2: #17375e;
      --blue: #2f6fb3;
      --navy: #10233f;
      --navy-2: #18395f;
      --blue: #2d6fb2;
      --blue-soft: #eaf3fc;
      --gray-900: #182235;
      --gray-700: #475569;
      --gray-500: #6b778a;
      --gray-300: #dbe2ea;
      --gray-700: #4b5568;
      --gray-500: #738094;
      --gray-300: #d7dee8;
      --gray-200: #e8edf3;
      --gray-100: #f6f8fb;
      --white: #ffffff;
      --max: 1080px;
      --radius: 8px;
      --shadow: 0 18px 48px rgba(15, 35, 65, 0.08);
      --shadow: 0 18px 42px rgba(16, 35, 63, 0.08);
    }

    * {

    .page {
      min-height: 100vh;
      background: linear-gradient(180deg, #f5f8fc 0, #ffffff 420px);
      background: linear-gradient(180deg, #f5f8fc 0, #ffffff 390px);
    }

    .container {
    }

    .hero {
      padding: 58px 0 34px;
      padding: 58px 0 36px;
      border-bottom: 1px solid var(--gray-200);
    }

    .hero__tag {
    .hero__label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .hero__tag::before {
    .hero__label::before {
      content: "";
      width: 34px;
      height: 2px;
      background: var(--blue);
    }

    .hero h1 {
      max-width: 900px;
    h1,
    h2,
    h3 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2rem, 4.6vw, 3.6rem);
      line-height: 1.28;
      line-height: 1.35;
      letter-spacing: 0;
    }

    h1 {
      max-width: 900px;
      font-size: clamp(2rem, 4.7vw, 3.6rem);
      font-weight: 850;
    }

    h2 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1.45rem, 2.4vw, 2rem);
    }

    h2::before {
      content: "";
      flex: 0 0 5px;
      width: 5px;
      height: 1.35em;
      background: var(--blue);
      border-radius: 999px;
    }

    h3 {
      font-size: 1.1rem;
    }

    p {
      margin: 0;
    }

    .hero__lead {
      max-width: 820px;
      margin: 22px 0 0;
      margin-top: 22px;
      color: var(--gray-700);
      font-size: clamp(1rem, 1.7vw, 1.16rem);
    }

    .hero__actions {
    .hero__tools {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      color: var(--white);
      background: var(--navy);
      border: 1px solid var(--navy);
      border-radius: 6px;
      color: var(--white);
      background: var(--navy);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .button--secondary {
    .button--outline {
      color: var(--navy);
      background: var(--white);
      border-color: var(--gray-300);
    }

    .hero__facts {
    .hero__cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 34px;
    }

    .fact {
      padding: 18px 18px 17px;
    .summary-card {
      min-height: 112px;
      padding: 18px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .fact span {
    .summary-card span {
      display: block;
      color: var(--gray-500);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .fact strong {
    .summary-card strong {
      display: block;
      margin-top: 6px;
      color: var(--navy);
      font-size: 1.05rem;
      line-height: 1.45;
      font-size: 1.04rem;
      line-height: 1.48;
    }

    .nav-bar {
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--gray-200);
      backdrop-filter: blur(14px);
      backdrop-filter: blur(12px);
    }

    .nav {
    }

    .nav a:hover,
    .nav a.is-current {
    .nav a.is-active {
      color: var(--blue);
      background: var(--blue-soft);
    }
    }

    .section__head p {
      margin: 10px 0 0;
      margin-top: 10px;
      color: var(--gray-700);
    }

    h2,
    h3 {
      margin: 0;
      color: var(--navy);
      line-height: 1.4;
      letter-spacing: 0;
    }

    h2 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1.48rem, 2.4vw, 2rem);
    }

    h2::before {
      content: "";
      flex: 0 0 5px;
      width: 5px;
      height: 1.35em;
      background: var(--blue);
      border-radius: 999px;
    }

    h3 {
      font-size: 1.1rem;
    }

    p {
      margin: 0;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: 0 12px 32px rgba(15, 35, 65, 0.05);
      box-shadow: 0 12px 32px rgba(16, 35, 63, 0.05);
    }

    .panel p + p {
      margin-top: 12px;
    }

    .lead-panel {
    .intro-panel {
      border-left: 5px solid var(--blue);
    }

    .learning {
    .learning-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .learning-card {
      min-height: 220px;
      padding: 22px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      min-height: 218px;
    }

    .learning-card__number {
    .learning-card__num {
      display: grid;
      place-items: center;
      width: 42px;
      margin-top: 6px;
    }

    .profile-grid {
    .definition {
      display: grid;
      gap: 14px;
    }

    .profile-item {
    .definition__item {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 18px;
      border-radius: var(--radius);
    }

    .profile-item dt {
    .definition__item dt {
      color: var(--blue);
      font-weight: 900;
    }

    .profile-item dd {
    .definition__item dd {
      margin: 0;
      color: var(--gray-700);
    }

    .phase {
      display: grid;
      grid-template-columns: minmax(170px, 228px) 1fr;
      grid-template-columns: minmax(170px, 226px) 1fr;
      gap: 24px;
      padding: 24px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .phase__side {
    .phase__meta {
      padding-right: 22px;
      border-right: 1px solid var(--gray-200);
    }
      line-height: 1.35;
    }

    .phase__state,
    .phase__purpose {
      color: var(--gray-700);
    }

    .phase__state {
      margin-top: 8px;
      color: var(--gray-700);
      font-size: 0.95rem;
    }

    .phase__purpose {
      margin-top: 8px;
      color: var(--gray-700);
    }

    .metrics {
      align-items: stretch;
    }

    .pay {
    .pay-box {
      padding: 26px;
      color: var(--white);
      background: var(--navy);
      border-radius: var(--radius);
    }

    .pay span {
    .pay-box span {
      display: block;
      color: #c9d8ea;
      font-weight: 800;
    }

    .pay strong {
    .pay-box strong {
      display: block;
      margin-top: 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    .pay small {
    .pay-box small {
      display: block;
      margin-top: 8px;
      color: #edf4fb;
    }

    @media (max-width: 900px) {
      .hero__facts,
      .learning,
      .hero__cards,
      .learning-grid,
      .evaluation {
        grid-template-columns: 1fr;
      }
        grid-template-columns: 1fr;
      }

      .phase__side {
      .phase__meta {
        padding-right: 0;
        padding-bottom: 16px;
        border-right: 0;
        padding-top: 42px;
      }

      .hero__actions {
      .hero__tools {
        flex-direction: column;
      }

        padding: 20px;
      }

      .profile-item,
      .definition__item,
      .metrics,
      .metrics--three,
      .focus-list {
        padding: 0 0 22px;
      }

      .hero__actions,
      .nav-bar {
      .hero__tools,
      .nav-wrap {
        display: none;
      }

      }

      .panel,
      .fact,
      .summary-card,
      .learning-card,
      .profile-item,
      .definition__item,
      .phase,
      .metric,
      .table-wrap,
      .pay,
      .pay-box,
      .president {
        box-shadow: none;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .hero__facts,
      .learning {
      .hero__cards,
      .learning-grid {
        grid-template-columns: repeat(3, 1fr);
      }

        grid-template-columns: 160px 1fr;
      }

      .phase__side {
      .phase__meta {
        padding-right: 16px;
        padding-bottom: 0;
        border-right: 1px solid var(--gray-300);
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .pay,
      .pay-box,
      .president,
      th {
        color: #ffffff !important;
  <div class="page">

        links.forEach((link) => {
